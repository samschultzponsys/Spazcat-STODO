<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Orbitron:wght@700&display=swap');

@font-face {
  font-family: 'Ethnocentric';
  src: url('/fonts/ethnocentric_rg.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'Ethnocentric';
  src: url('/fonts/ethnocentric_rg_it.otf') format('opentype');
  font-weight: normal;
  font-style: italic;
}

:root {
  --bg:       #0d0d0d;
  --surface:  #161616;
  --border:   #2a2a2a;
  --accent:   #5f249f;
  --accent-hover: #7b30c9;
  --danger:   #ff3b3b;
  --text:     #f0f0f0;
  --title:    #ffffff;
  --muted:    #555;
  --radius:   6px;
  --font-mono: 'DM Mono', monospace;
  --font-disp: 'Ethnocentric', 'Orbitron', sans-serif;
}

/* Light mode */
.light {
  --bg:      #f4f4f4;
  --surface: #ffffff;
  --border:  #ddd;
  --text:    #1a1a1a;
  --title:   #1a1a1a;
  --muted:   #999;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  transition: background .2s, color .2s;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  transition: background .2s, border-color .2s;
}

.logo {
  font-family: var(--font-disp);
  font-size: clamp(16px, 4vw, 26px);
  letter-spacing: 1px;
  color: var(--title);
  -webkit-text-stroke: 1.5px var(--accent);
  paint-order: stroke fill;
  line-height: 1;
  white-space: nowrap;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.count-badge {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  white-space: nowrap;
}

/* Theme toggle */
.theme-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  cursor: pointer;
  font-size: 16px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
}
.theme-btn:hover { border-color: var(--accent); }

/* Live dot */
.live-dot {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%,100% { opacity: 1;  transform: scale(1); }
  50%      { opacity: .3; transform: scale(.7); }
}

/* ── Add form ── */
.add-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  transition: background .2s, border-color .2s;
}

.add-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .15s, background .2s, color .2s;
  -webkit-appearance: none;
  min-width: 0;
}
.add-row input::placeholder { color: var(--muted); }
.add-row input:focus { border-color: var(--accent); }

.add-row button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-disp);
  font-size: 16px;
  letter-spacing: 1px;
  padding: 0 18px;
  cursor: pointer;
  transition: opacity .15s, transform .1s, background .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.add-row button:hover  { background: var(--accent-hover); }
.add-row button:active { opacity: .8; transform: scale(.97); }

/* ── List ── */
#list {
  flex: 1;
  padding: 8px 10px 60px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.item {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  transition: transform .15s, opacity .2s, border-color .15s, background .2s;
  touch-action: pan-y;
  user-select: none;
}
.item.dragging  { opacity: .55; border-color: var(--accent); transform: scale(1.01); z-index: 50; }
.item.drag-over { border-color: var(--accent); border-style: dashed; }
.item.removing  { transform: translateX(100%); opacity: 0; pointer-events: none; }
.item.adding    { animation: slideIn .2s ease-out; }
@keyframes slideIn {
  from { transform: translateY(-8px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.drag-handle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  min-height: 50px;
  color: var(--muted);
  cursor: grab;
  flex-shrink: 0;
  font-size: 16px;
  transition: color .15s;
}
.drag-handle:hover  { color: var(--accent); }
.drag-handle:active { cursor: grabbing; }

.item-num {
  font-size: 10px;
  color: var(--muted);
  min-width: 22px;
  text-align: right;
  flex-shrink: 0;
  padding-right: 4px;
}

.item-text {
  flex: 1;
  font-size: 15px;
  line-height: 1.4;
  padding: 13px 8px 13px 4px;
  word-break: break-word;
  color: var(--text);
  transition: color .2s;
}

.del-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  min-height: 50px;
  color: var(--muted);
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 17px;
  flex-shrink: 0;
  transition: color .15s, background .15s;
}
.del-btn:hover  { color: var(--danger); background: rgba(255,59,59,.08); }
.del-btn:active { background: rgba(255,59,59,.18); }

/* ── Empty state ── */
#empty {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 12px;
  padding: 60px 20px;
  color: var(--muted);
}
#empty .empty-icon { font-size: 48px; opacity: .3; }
#empty p { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; font-family: var(--font-disp); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Mobile ── */
@media (max-width: 500px) {
  .logo { font-size: clamp(13px, 3.5vw, 18px); }
  .item-text { font-size: 14px; }
  .add-row input { font-size: 16px; }
}
</style>
</head>
<body>

<header>
  <span class="logo" id="app-title">SPAZCAT TO DO</span>
  <div class="header-right">
    <span class="count-badge" id="count-badge">0 items</span>
    <button class="theme-btn" id="theme-btn" title="Toggle light/dark mode">🌙</button>
    <span class="live-dot" title="Live sync"></span>
  </div>
</header>

<div class="add-row">
  <input id="new-item" type="text" placeholder="Add item…" autocomplete="off" autocorrect="off" spellcheck="false">
  <button id="add-btn">ADD</button>
</div>

<div id="list"></div>
<div id="empty">
  <span class="empty-icon">✓</span>
  <p id="empty-label">All clear</p>
</div>

<script>
// ── Token passthrough ─────────────────────────────────────────────────────────
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const QS    = TOKEN ? `?token=${encodeURIComponent(TOKEN)}` : '';
const API   = `/api/items${QS}`;
const CFGURL = `/api/config${QS}`;

// ── Theme ─────────────────────────────────────────────────────────────────────
const themeBtn = document.getElementById('theme-btn');
let dark = localStorage.getItem('stodo-theme') !== 'light';

function applyTheme() {
  document.body.classList.toggle('light', !dark);
  themeBtn.textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('stodo-theme', dark ? 'dark' : 'light');
}
applyTheme();
themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });

// ── Config from server ────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const res  = await fetch(CFGURL);
    const cfg  = await res.json();
    if (cfg.title)       document.getElementById('app-title').textContent = cfg.title;
    if (cfg.subtitle)    document.title = cfg.subtitle;
    if (cfg.accentColor) {
      document.documentElement.style.setProperty('--accent', cfg.accentColor);
      // Slightly lighter for hover
      document.documentElement.style.setProperty('--accent-hover', cfg.accentColor + 'cc');
    }
    if (cfg.bgColor)      document.documentElement.style.setProperty('--bg',      cfg.bgColor);
    if (cfg.surfaceColor) document.documentElement.style.setProperty('--surface', cfg.surfaceColor);
    if (cfg.titleColor)   document.documentElement.style.setProperty('--title',   cfg.titleColor);
    if (cfg.textColor)    document.documentElement.style.setProperty('--text',    cfg.textColor);
  } catch(e) { /* use defaults */ }
}

// ── Data ──────────────────────────────────────────────────────────────────────
let items = [];
let lastFingerprint = null;
let dragSrcId = null;

async function load(animate = false) {
  try {
    const res  = await fetch(API);
    const data = await res.json();
    const fp   = data.map(i => `${i.id}:${i.pos}:${i.text}`).join('|');
    if (fp === lastFingerprint) return;
    lastFingerprint = fp;
    const prevIds = new Set(items.map(i => i.id));
    items = data;
    render(animate ? prevIds : null);
  } catch(e) { /* silent */ }
}

function render(newIds = null) {
  const list  = document.getElementById('list');
  const empty = document.getElementById('empty');
  const badge = document.getElementById('count-badge');

  badge.textContent = items.length === 1 ? '1 item' : `${items.length} items`;

  if (items.length === 0) {
    list.innerHTML = '';
    list.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  list.style.display  = 'flex';

  const existing = {};
  list.querySelectorAll('.item').forEach(el => { existing[el.dataset.id] = el; });

  const frag = document.createDocumentFragment();
  items.forEach((item, idx) => {
    let el = existing[item.id];
    if (!el) {
      el = buildItem(item);
      if (newIds && !newIds.has(item.id)) el.classList.add('adding');
    } else {
      el.querySelector('.item-text').textContent = item.text;
    }
    el.querySelector('.item-num').textContent = idx + 1;
    el.dataset.id  = item.id;
    el.dataset.pos = item.pos;
    frag.appendChild(el);
  });
  list.innerHTML = '';
  list.appendChild(frag);
}

function buildItem(item) {
  const el = document.createElement('div');
  el.className  = 'item';
  el.dataset.id = item.id;
  el.draggable  = true;
  el.innerHTML  = `
    <div class="drag-handle">⠿</div>
    <span class="item-num"></span>
    <span class="item-text">${escHtml(item.text)}</span>
    <button class="del-btn" title="Done">✕</button>
  `;
  el.querySelector('.del-btn').addEventListener('click', () => removeItem(item.id, el));
  el.addEventListener('dragstart', onDragStart);
  el.addEventListener('dragover',  onDragOver);
  el.addEventListener('dragleave', onDragLeave);
  el.addEventListener('drop',      onDrop);
  el.addEventListener('dragend',   onDragEnd);
  attachTouchDrag(el);
  return el;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Add ───────────────────────────────────────────────────────────────────────
async function addItem(text) {
  if (!text) return;
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    if (!res.ok) console.error('Add failed:', res.status);
    await load(true);
  } catch(e) {
    console.error('Add error:', e);
    alert('Could not reach the API.');
  }
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function removeItem(id, el) {
  el.classList.add('removing');
  setTimeout(async () => {
    await fetch(`/api/items/${id}${QS}`, {method:'DELETE'});
    await load(false);
  }, 200);
}

// ── Drag & drop (desktop) ─────────────────────────────────────────────────────
function onDragStart(e) { dragSrcId = +this.dataset.id; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (+this.dataset.id !== dragSrcId) this.classList.add('drag-over'); }
function onDragLeave()  { this.classList.remove('drag-over'); }
function onDragEnd()    { document.querySelectorAll('.item').forEach(el => el.classList.remove('dragging','drag-over')); }
function onDrop(e) {
  e.stopPropagation();
  const targetId = +this.dataset.id;
  this.classList.remove('drag-over');
  if (targetId !== dragSrcId) reorderDrop(dragSrcId, targetId);
}

async function reorderDrop(srcId, tgtId) {
  const si = items.findIndex(i => i.id === srcId);
  const ti = items.findIndex(i => i.id === tgtId);
  if (si < 0 || ti < 0) return;
  const reordered = [...items];
  const [moved] = reordered.splice(si, 1);
  reordered.splice(ti, 0, moved);
  const order = reordered.map((item, idx) => ({id: item.id, pos: idx + 1}));
  await fetch(`/api/items/reorder${QS}`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(order)
  });
  await load(false);
}

// ── Touch drag (mobile) ───────────────────────────────────────────────────────
function attachTouchDrag(el) {
  let startY, startX, clone, lastOver;
  el.querySelector('.drag-handle').addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    startY = t.clientY; startX = t.clientX;
    dragSrcId = +el.dataset.id;
    clone = el.cloneNode(true);
    const r = el.getBoundingClientRect();
    clone.style.cssText = `position:fixed;z-index:999;left:${r.left}px;top:${r.top}px;width:${el.offsetWidth}px;opacity:.7;pointer-events:none;transition:none;`;
    document.body.appendChild(clone);
    el.classList.add('dragging');
  }, {passive:false});

  el.querySelector('.drag-handle').addEventListener('touchmove', e => {
    if (!clone) return;
    e.preventDefault();
    const t = e.touches[0];
    clone.style.top  = (parseFloat(clone.style.top)  + (t.clientY - startY)) + 'px';
    clone.style.left = (parseFloat(clone.style.left) + (t.clientX - startX)) + 'px';
    startY = t.clientY; startX = t.clientX;
    clone.style.display = 'none';
    const under = document.elementFromPoint(t.clientX, t.clientY);
    clone.style.display = '';
    const overItem = under && under.closest('.item');
    if (lastOver && lastOver !== el) lastOver.classList.remove('drag-over');
    if (overItem && overItem !== el) { overItem.classList.add('drag-over'); lastOver = overItem; }
  }, {passive:false});

  el.querySelector('.drag-handle').addEventListener('touchend', async () => {
    if (!clone) return;
    document.body.removeChild(clone); clone = null;
    el.classList.remove('dragging');
    if (lastOver) {
      lastOver.classList.remove('drag-over');
      const tgtId = +lastOver.dataset.id;
      if (tgtId && tgtId !== dragSrcId) await reorderDrop(dragSrcId, tgtId);
      lastOver = null;
    }
  });
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', () => {
  const inp = document.getElementById('new-item');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  addItem(val);
  inp.focus();
});
document.getElementById('new-item').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (!val) return;
    e.target.value = '';
    addItem(val);
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadConfig();
load(false);
setInterval(() => load(true), 5000);
</script>
</body>
</html>
